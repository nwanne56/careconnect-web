<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <!-- ===== SEO: title + description ===== -->
  <title>CareConnect — Accessible Health Portal</title>
  <meta name="description"
        content="CareConnect is a responsive, accessibility-first health portal to manage your care: personalized dashboard, notifications, and profile — WCAG 2.1 AA." />
  <link rel="canonical" href="https://careconnect.example.com/" />

  <!-- ===== SEO: Open Graph / social sharing ===== -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="CareConnect" />
  <meta property="og:title" content="CareConnect — Accessible Health Portal" />
  <meta property="og:description"
        content="A responsive, accessibility-first health portal: dashboard, notifications, and profile management." />
  <meta property="og:url" content="https://careconnect.example.com/" />
  <meta property="og:image" content="./icons/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="CareConnect — Accessible Health Portal" />
  <meta name="twitter:description"
        content="A responsive, accessibility-first health portal: dashboard, notifications, and profile management." />

  <!-- ===== PWA: manifest, theme color, iOS install ===== -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#2C7A7B" />
  <link rel="preload" href="/fonts/epilogue-latin.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/fonts/nunito-sans-latin.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="CareConnect" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
